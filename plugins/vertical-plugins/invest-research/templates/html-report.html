<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투자 리서치 인터랙티브 대시보드 - ${COMPANY_NAME} (${TICKER})</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(22, 30, 49, 0.65);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-yellow: #fbbf24;
            --accent-red: #f87171;
            --accent-purple: #a78bfa;
            --sidebar-width: 280px;
            
            --dyn-color: var(--accent-yellow);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.06), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(167, 139, 250, 0.06), transparent 30%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 사이드바 */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(11, 17, 28, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.2rem;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
        }

        .sidebar h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2.5rem;
            padding: 0 0.5rem;
            letter-spacing: -0.5px;
            line-height: 1.4;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 0.9rem 1.2rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            transform: translateX(4px);
        }

        .nav-btn.active {
            background: rgba(56, 189, 248, 0.08);
            color: var(--accent-blue);
            border-color: rgba(56, 189, 248, 0.2);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.08);
        }

        /* 메인 콘텐츠 */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 시나리오 컨트롤러 헤더 */
        .header {
            background: rgba(11, 17, 28, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .scenario-controls { display: flex; gap: 0.8rem; }
        .sc-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .sc-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-main); }
        .sc-btn.active[data-sc="bear"] { background: rgba(248, 113, 113, 0.15); color: var(--accent-red); border-color: var(--accent-red); box-shadow: 0 0 15px rgba(248, 113, 113, 0.15); }
        .sc-btn.active[data-sc="base"] { background: rgba(251, 191, 36, 0.15); color: var(--accent-yellow); border-color: var(--accent-yellow); box-shadow: 0 0 15px rgba(251, 191, 36, 0.15); }
        .sc-btn.active[data-sc="bull"] { background: rgba(52, 211, 153, 0.15); color: var(--accent-green); border-color: var(--accent-green); box-shadow: 0 0 15px rgba(52, 211, 153, 0.15); }

        .kpi-board { display: flex; gap: 2.5rem; }
        .kpi-item { display: flex; flex-direction: column; align-items: flex-end; }
        .kpi-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.2rem; }
        .kpi-value { font-size: 1.6rem; font-weight: 700; color: var(--dyn-color); transition: color 0.3s; }

        /* 콘텐츠 영역 */
        .content-area {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
        }

        /* 대시보드 구조 */
        #visual-dashboard {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.5s ease-out;
        }

        .viz-grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .viz-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.8rem;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .viz-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--dyn-color), transparent);
            opacity: 0.4;
        }

        .viz-title {
            color: var(--accent-blue);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.6rem;
        }

        /* 정성적 분석 내러티브 스타일 */
        .narrative-container {
            line-height: 1.7;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        
        .narrative-container h4 {
            font-size: 1.1rem;
            color: #fff;
            margin-top: 1.2rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        .narrative-container p {
            margin-bottom: 1rem;
            font-weight: 300;
            color: #cbd5e1;
        }

        .verification-log {
            background: rgba(0, 0, 0, 0.25);
            border-left: 4px solid var(--accent-green);
            padding: 1rem 1.2rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .verification-log strong {
            color: var(--accent-green);
            display: block;
            margin-bottom: 0.4rem;
        }

        /* 차트 컨테이너 */
        .chart-wrapper {
            position: relative;
            height: 250px;
            width: 100%;
        }

        /* 풋볼 필드 차트 */
        .val-range { display: flex; align-items: center; height: 70px; position: relative; margin: 2rem 0; background: rgba(0,0,0,0.4); border-radius: 35px; padding: 0 30px; border: 1px solid rgba(255,255,255,0.05); }
        .val-line { position: absolute; top: 50%; left: 10%; right: 10%; height: 6px; background: rgba(255,255,255,0.08); transform: translateY(-50%); border-radius: 3px; }
        .val-marker { position: absolute; top: 50%; width: 22px; height: 22px; border-radius: 50%; transform: translate(-50%, -50%); border: 4px solid #080c14; z-index: 2; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .val-label { position: absolute; top: -32px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
        .val-price { position: absolute; bottom: -27px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; font-weight: 700; color: #fff; }
        
        .m-bear { background: var(--accent-red); left: 20%; }
        .m-base { background: var(--accent-yellow); left: 60%; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); width: 26px; height: 26px; z-index: 3; }
        .m-bull { background: var(--accent-green); left: 90%; }
        .m-curr { background: #fff; left: 58%; width: 14px; height: 14px; border-radius: 0; transform: translate(-50%, -50%) rotate(45deg); }

        /* 밸류에이션 민감도 표 */
        .table-styled {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .table-styled th, .table-styled td {
            padding: 0.6rem 0.8rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .table-styled th {
            background: rgba(0,0,0,0.3);
            color: var(--accent-blue);
            font-weight: 600;
        }
        .table-styled td {
            color: #cbd5e1;
        }
        .highlight-cell {
            background: rgba(251, 191, 36, 0.1) !important;
            border: 1px solid var(--accent-yellow) !important;
            color: var(--accent-yellow) !important;
            font-weight: 700;
        }

        /* 기술적 분석 보조 지표 */
        .tech-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 0.6rem;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .tech-lbl { font-weight: 600; color: #94a3b8; font-size: 0.9rem; }
        .tech-val { font-weight: 700; font-size: 1rem; }
        
        .signal-neutral { color: var(--accent-yellow); }
        .signal-bearish { color: var(--accent-red); }
        .signal-bullish { color: var(--accent-green); }

        /* 리스크 매트릭스 */
        .risk-matrix { position: relative; height: 260px; background: rgba(0,0,0,0.3); border-left: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); margin: 1rem 0 1rem 2rem; }
        .rm-y { position: absolute; left: -2.2rem; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 600; }
        .rm-x { position: absolute; bottom: -2.2rem; left: 50%; transform: translateX(-50%); font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 600; }
        .risk-dot { position: absolute; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; color: #fff; transform: translate(-50%, -50%); box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; white-space: nowrap; }
        .r-high { background: linear-gradient(135deg, var(--accent-red), #b91c1c); }
        .r-med { background: linear-gradient(135deg, var(--accent-yellow), #d97706); }
        .r-low { background: linear-gradient(135deg, var(--accent-blue), #0284c7); }

        /* 분할 선 및 원본 MD 토글 */
        .doc-divider {
            display: flex;
            align-items: center;
            margin: 2.5rem 0;
            gap: 1.5rem;
        }
        .doc-divider::before, .doc-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
        
        .toggle-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
            transition: all 0.3s;
            font-weight: 600;
        }
        .toggle-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }

        /* 마크다운 렌더링 영역 */
        .markdown-body {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(15px);
            color: var(--text-main);
            line-height: 1.8;
            display: none;
            animation: fadeIn 0.5s ease-out;
            box-shadow: 0 10px 45px rgba(0,0,0,0.2);
        }

        .markdown-body.show { display: block; }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.8em; margin-bottom: 0.6em; color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.4em;
            font-weight: 700;
        }
        .markdown-body h1 { font-size: 1.8em; color: var(--accent-blue); }
        .markdown-body h2 { font-size: 1.4em; color: var(--accent-blue); }
        .markdown-body h3 { font-size: 1.1em; color: #cbd5e1; }
        .markdown-body p { margin-bottom: 1.2em; color: #cbd5e1; font-weight: 300; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.8em 0; font-size: 0.85rem; }
        .markdown-body th, .markdown-body td { padding: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .markdown-body th { background: rgba(0, 0, 0, 0.2); color: #fff; font-weight: 600; }
        .markdown-body td { color: #cbd5e1; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1.2em; padding-left: 2em; color: #cbd5e1; }
        .markdown-body li { margin-bottom: 0.5em; font-weight: 300; }
        .markdown-body strong { color: #f8fafc; font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <!-- 사이드바 -->
    <div class="sidebar">
        <h1 id="main-title">투자 리서치 대시보드<br><span style="font-size:0.9rem; color:var(--text-muted); font-weight:400;">${COMPANY_NAME} (${TICKER})</span></h1>
        <button class="nav-btn" data-target="01_Financial">📊 01 재무 분석 (정량)</button>
        <button class="nav-btn" data-target="02_Fundamental">🏛️ 02 펀더멘털 분석 (정성)</button>
        <button class="nav-btn" data-target="03_Valuation">⚖️ 03 밸류에이션 분석 (정량)</button>
        <button class="nav-btn" data-target="04_Technical">📈 04 기술적 분석 (정량)</button>
        <button class="nav-btn" data-target="05_Macro_Sentiment">🌍 05 거시경제 및 심리 (정성)</button>
        <button class="nav-btn" data-target="06_Risk_Scenario">⚠️ 06 리스크 및 시나리오 (정성)</button>
        <button class="nav-btn" data-target="07_Draft">📝 07 종합 보고서 초안</button>
        <button class="nav-btn active" data-target="08_Final">🏆 08 최종 투자 리포트</button>
    </div>

    <!-- 메인 랩퍼 -->
    <div class="main-wrapper">
        
        <!-- 헤더 / 시나리오 컨트롤러 -->
        <div class="header">
            <div class="scenario-controls">
                <button class="sc-btn" data-sc="bear">하락 (Bear) 시나리오</button>
                <button class="sc-btn active" data-sc="base">기본 (Base) 시나리오</button>
                <button class="sc-btn" data-sc="bull">상승 (Bull) 시나리오</button>
            </div>
            <div class="kpi-board">
                <div class="kpi-item">
                    <span class="kpi-label">투자 의견</span>
                    <span class="kpi-value" id="kpi-rating">${INITIAL_RATING}</span>
                </div>
                <div class="kpi-item">
                    <span class="kpi-label">목표 주가</span>
                    <span class="kpi-value" id="kpi-price">${INITIAL_PRICE}</span>
                </div>
                <div class="kpi-item">
                    <span class="kpi-label">상승 여력</span>
                    <span class="kpi-value" id="kpi-upside">${INITIAL_UPSIDE}</span>
                </div>
            </div>
        </div>

        <div class="content-area">
            
            <!-- 다이내믹 비주얼 대시보드 카드 영역 -->
            <div id="visual-dashboard"></div>

            <div class="doc-divider">
                <button class="toggle-btn" id="toggle-md-btn">
                    <span>📑 원본 마크다운(MD) 보고서 전문 보기</span>
                </button>
            </div>

            <!-- 마크다운 렌더링 컨테이너 -->
            <div id="md-container" class="markdown-body"></div>
            
        </div>
    </div>

    <!-- 마크다운 텍스트 및 데이터 주입 플레이스홀더 -->
    <script>
        // 이 영역은 html-report-synthesizer 가 빌드 시 JSON 데이터를 주입합니다.
        const mdData = ${MD_DATA_JSON};
        let currentTab = '08_Final';
        let currentScen = 'base';
        let mainChart = null;
        let roicChart = null;

        // 시나리오별 시뮬레이션 원천 데이터
        const scenarioData = ${SCENARIO_DATA_JSON};

        // 시각화 렌더러 정의
        const vizRenderers = {
            "01_Financial": () => {
                const d = scenarioData[currentScen];
                return `
                <div class="viz-grid-2x2">
                    <div class="viz-card">
                        <div class="viz-title">📊 주요 재무 성장 트렌드 (매출액 / 순이익 / FCF)</div>
                        <div class="chart-wrapper"><canvas id="finMainChart"></canvas></div>
                    </div>
                    <div class="viz-card">
                        <div class="viz-title">🎯 자본 효율성 지표 (ROE / ROIC)</div>
                        <div class="chart-wrapper"><canvas id="finRoicChart"></canvas></div>
                    </div>
                </div>
                
                <div class="viz-card" style="margin-bottom: 1.5rem;">
                    <div class="viz-title">📋 다차원 재무 상태 요약 그리드</div>
                    <table class="table-styled">
                        <thead>
                            <tr>
                                <th>재무 지표</th>
                                <th>${YEAR_A}A</th>
                                <th>${YEAR_B}A</th>
                                <th class="highlight-cell">${YEAR_C}E (현재 시나리오)</th>
                                <th>변동 추세 / 해석</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>매출액 (Revenue)</strong></td>
                                <td>\${d.rev_hist_a}</td>
                                <td>\${d.rev_hist_b}</td>
                                <td class="highlight-cell">\${d.rev} (\${d.revGr})</td>
                                <td>\${d.rev_comment}</td>
                            </tr>
                            <tr>
                                <td><strong>영업이익률 (OPM)</strong></td>
                                <td>\${d.opm_hist_a}</td>
                                <td>\${d.opm_hist_b}</td>
                                <td class="highlight-cell">\${d.opm}</td>
                                <td>\${d.opm_comment}</td>
                            </tr>
                            <tr>
                                <td><strong>순이익 (Net Income)</strong></td>
                                <td>\${d.net_hist_a}</td>
                                <td>\${d.net_hist_b}</td>
                                <td class="highlight-cell">$ \${d.netIncData[2].toFixed(2)}B</td>
                                <td>\${d.net_comment}</td>
                            </tr>
                            <tr>
                                <td><strong>잉여현금흐름 (FCF)</strong></td>
                                <td>\${d.fcf_hist_a}</td>
                                <td>\${d.fcf_hist_b}</td>
                                <td class="highlight-cell">$ \${d.fcfData[2].toFixed(2)}B</td>
                                <td>\${d.fcf_comment}</td>
                            </tr>
                            <tr>
                                <td><strong>투하자본수익률 (ROIC)</strong></td>
                                <td>\${d.roic_hist_a}</td>
                                <td>\${d.roic_hist_b}</td>
                                <td class="highlight-cell">\${d.roicData[2].toFixed(1)}%</td>
                                <td>\${d.roic_comment}</td>
                            </tr>
                            <tr>
                                <td><strong>순부채 (Net Debt)</strong></td>
                                <td>\${d.nd_hist_a}</td>
                                <td>\${d.nd_hist_b}</td>
                                <td class="highlight-cell">\${d.net_debt_current}</td>
                                <td>\${d.nd_comment}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>`;
            },
            "02_Fundamental": () => {
                return `${FUNDAMENTAL_DASHBOARD_HTML}`;
            },
            "03_Valuation": () => {
                const sc = scenarioData[currentScen];
                return `
                <div class="viz-card" style="margin-bottom: 1.5rem;">
                    <div class="viz-title">🏈 밸류에이션 풋볼 필드 (목표 주가 도출 궤적)</div>
                    <div class="val-range">
                        <div class="val-line"></div>
                        <div class="val-marker m-curr" title="현재 시장 가격"><div class="val-label" style="color:#fff;">현재 주가</div><div class="val-price">\${sc.current_price}</div></div>
                        <div class="val-marker m-bear" style="border-color:\${currentScen==='bear'?'#fff':'#0b0f19'}"><div class="val-label" style="color:var(--accent-red);">하락 (Bear)</div><div class="val-price">\${scenarioData.bear.price}</div></div>
                        <div class="val-marker m-base" style="border-color:\${currentScen==='base'?'#fff':'#0b0f19'}"><div class="val-label" style="color:var(--accent-yellow);">기본 (Base)</div><div class="val-price">\${scenarioData.base.price}</div></div>
                        <div class="val-marker m-bull" style="border-color:\${currentScen==='bull'?'#fff':'#0b0f19'}"><div class="val-label" style="color:var(--accent-green);">상승 (Bull)</div><div class="val-price">\${scenarioData.bull.price}</div></div>
                    </div>
                </div>
                
                <div class="viz-grid-2x2">
                    <div class="viz-card">
                        <div class="viz-title">📐 DCF 내재가치 WACC vs 영구성장률(PGR) 민감도 시각화</div>
                        ${VALUATION_SENSITIVITY_TABLE}
                    </div>
                    
                    <div class="viz-card">
                        <div class="viz-title">👥 글로벌 피어 상대 밸류에이션 지표 비교</div>
                        ${VALUATION_COMPS_TABLE}
                    </div>
                </div>`;
            },
            "04_Technical": () => {
                return `${TECHNICAL_DASHBOARD_HTML}`;
            },
            "05_Macro_Sentiment": () => {
                return `${MACRO_DASHBOARD_HTML}`;
            },
            "06_Risk_Scenario": () => {
                return `${RISK_DASHBOARD_HTML}`;
            },
            "07_Draft": () => `<div class="viz-card"><div class="viz-title">📝 종합 보고서 초안</div><div style="text-align:center; padding:2rem; color:var(--text-muted);">16단계 평가 과정을 거쳐 도출된 종합 투자 보고서 초안입니다. 아래 버튼을 눌러 마크다운 전문을 확인하십시오.</div></div>`,
            "08_Final": () => `<div class="viz-card"><div class="viz-title">🏆 최종 확정 투자 리포트</div><div style="text-align:center; padding:2rem; color:var(--text-muted);">QA 리뷰 및 데이터 한계 교차 검증을 완료한 최종 완성본 리포트입니다. 아래 버튼을 눌러 정밀한 투자 보고서 전문을 열람하실 수 있습니다.</div></div>`
        };

        // Chart.js 인스턴스 렌더링 함수
        function initCharts() {
            if (currentTab !== '01_Financial') return;
            
            const ctxMain = document.getElementById('finMainChart');
            const ctxRoic = document.getElementById('finRoicChart');
            if(!ctxMain || !ctxRoic) return;
            
            if(mainChart) mainChart.destroy();
            if(roicChart) roicChart.destroy();
            
            const d = scenarioData[currentScen];
            
            // 차트 1: 매출액 vs 순이익 vs FCF 트렌드
            mainChart = new Chart(ctxMain, {
                type: 'bar',
                data: {
                    labels: ['${YEAR_A}A', '${YEAR_B}A', '${YEAR_C}E (전망)'],
                    datasets: [
                        {
                            label: '매출액 ($B)',
                            data: d.chartData,
                            backgroundColor: 'rgba(56, 189, 248, 0.4)',
                            borderColor: 'var(--accent-blue)',
                            borderWidth: 1.5,
                            borderRadius: 4
                        },
                        {
                            label: '순이익 ($B)',
                            data: d.netIncData,
                            type: 'line',
                            borderColor: 'var(--accent-purple)',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.1,
                            yAxisID: 'y1'
                        },
                        {
                            label: '잉여현금흐름 (FCF) ($B)',
                            data: d.fcfData,
                            type: 'line',
                            borderColor: d.color,
                            backgroundColor: 'transparent',
                            borderWidth: 2.5,
                            borderDash: [5, 5],
                            tension: 0.1,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#94a3b8', font: { family: 'Outfit' } } }
                    },
                    scales: {
                        y: { 
                            title: { display: true, text: '매출액 ($B)', color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.03)' }, 
                            ticks: { color: '#94a3b8' } 
                        },
                        y1: {
                            position: 'right',
                            title: { display: true, text: '이익 및 FCF ($B)', color: '#94a3b8' },
                            grid: { drawOnChartArea: false },
                            ticks: { color: '#94a3b8' }
                        },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });

            // 차트 2: ROE vs ROIC 트렌드
            roicChart = new Chart(ctxRoic, {
                type: 'line',
                data: {
                    labels: ['${YEAR_A}A', '${YEAR_B}A', '${YEAR_C}E (전망)'],
                    datasets: [
                        {
                            label: 'ROE (%)',
                            data: d.roeData,
                            borderColor: 'var(--accent-purple)',
                            backgroundColor: 'rgba(167, 139, 250, 0.1)',
                            fill: true,
                            borderWidth: 2,
                            tension: 0.15
                        },
                        {
                            label: 'ROIC (%)',
                            data: d.roicData,
                            borderColor: d.color,
                            backgroundColor: 'transparent',
                            borderWidth: 3,
                            tension: 0.15
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#94a3b8', font: { family: 'Outfit' } } }
                    },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function updateScenario(sc) {
            currentScen = sc;
            const data = scenarioData[sc];
            
            document.documentElement.style.setProperty('--dyn-color', data.color);
            
            document.getElementById('kpi-rating').textContent = data.rating;
            document.getElementById('kpi-price').textContent = data.price;
            document.getElementById('kpi-upside').textContent = data.upside;
            
            // 대시보드 강제 재렌더링
            renderVisualDashboard();
        }

        function renderVisualDashboard() {
            const vizContainer = document.getElementById('visual-dashboard');
            if (vizRenderers[currentTab]) {
                vizContainer.innerHTML = vizRenderers[currentTab]();
                setTimeout(initCharts, 50);
            } else {
                vizContainer.innerHTML = '';
            }
        }

        function loadMarkdown(key) {
            const rawMd = mdData[key] || "내용이 없습니다.";
            document.getElementById('md-container').innerHTML = marked.parse(rawMd);
        }

        function switchTab(targetKey) {
            currentTab = targetKey;
            
            // 시각화 대시보드 렌더링
            renderVisualDashboard();
            
            // 마크다운 파싱 및 로드
            loadMarkdown(targetKey);
            
            // 마크다운 뷰어는 탭 교체 시 우선 숨겨서 대시보드가 주인공이 되도록 설정
            const mdContainer = document.getElementById('md-container');
            mdContainer.classList.remove('show');
            const toggleBtn = document.getElementById('toggle-md-btn');
            toggleBtn.innerHTML = '<span>📑 원본 마크다운(MD) 보고서 전문 보기</span>';
        }

        // 시나리오 버튼 바인딩
        document.querySelectorAll('.sc-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                updateScenario(e.target.getAttribute('data-sc'));
            });
        });

        // 네비게이션 버튼 바인딩
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                switchTab(e.target.getAttribute('data-target'));
            });
        });

        // 마크다운 토글 토글러
        document.getElementById('toggle-md-btn').addEventListener('click', function() {
            const mdContainer = document.getElementById('md-container');
            if(mdContainer.classList.contains('show')) {
                mdContainer.classList.remove('show');
                this.innerHTML = '<span>📑 원본 마크다운(MD) 보고서 전문 보기</span>';
            } else {
                mdContainer.classList.add('show');
                this.innerHTML = '<span>🙈 마크다운 전문 숨기기</span>';
            }
        });

        // 초기화
        switchTab('08_Final');
        updateScenario('base');
    </script>
</body>
</html>
